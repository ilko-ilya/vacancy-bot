name: Deploy Bot to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to server and run commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }} # <-- НОВОЕ
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,BOT_TOKEN,CHAT_ID,SCRAPER_API_KEY # <-- НОВОЕ (добавил через запятую без пробелов)
          script: |
            cd vacancy-bot
            git pull origin main
            ./mvnw clean package -DskipTests
            pkill java || true
            # <-- НОВОЕ: добавил SCRAPER_API_KEY в команду nohup
            nohup env DB_PASSWORD="$DB_PASSWORD" BOT_TOKEN="$BOT_TOKEN" CHAT_ID="$CHAT_ID" SCRAPER_API_KEY="$SCRAPER_API_KEY" java -jar target/vacancy-bot-0.0.1-SNAPSHOT.jar > bot.log 2>&1 &
